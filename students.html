<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYK Yönetim | Öğrenciler</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">🏫</div>
            <div>
                <span>KYK YÖNETİM</span>
                <small>Yurt Yönetim Paneli</small>
            </div>
        </div>
        <nav>
            <a href="index.html" class="nav-item">
                <span class="nav-icon">📋</span> Başvurular
            </a>
            <a href="students.html" class="nav-item active">
                <span class="nav-icon">👥</span> Öğrenciler
            </a>
            <a href="leaves.html" class="nav-item">
                <span class="nav-icon">🗓</span> İzin Talepleri
            </a>
            <a href="payments.html" class="nav-item">
                <span class="nav-icon">💳</span> Ödemeler
            </a>
            <a href="rooms.html" class="nav-item">
                <span class="nav-icon">🚪</span> Oda Durumları
            </a>
        </nav>
    </div>

    <div id="main">
        <div class="page-header">
            <div>
                <div class="page-title">Öğrenci Listesi</div>
            </div>
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="ara" placeholder="İsim veya TC ile ara...">
            </div>
            <div class="live-badge">
                <span class="live-dot"></span>
                <span id="date">—</span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">Kayıtlı Öğrenciler</span>
                <div class="filter-group">
                    <select id="blok-filtre" onchange="getStudents()" class="filter-select">
                        <option value="">Tüm Bloklar</option>
                    </select>
                    <select id="durum-filtre" onchange="renderTable()" class="filter-select">
                        <option value="">Tümü</option>
                        <option value="1">Sadece Aktifler</option>
                        <option value="0">Sadece Deaktifler</option>
                    </select>
                    <select id="siralama" onchange="getStudents()" class="filter-select">
                        <option value="">Sıralama</option>
                        <option value="dogum-eski">Doğum Tarihi (Eskiden Yeniye)</option>
                        <option value="dogum-yeni">Doğum Tarihi (Yeniden Eskiye)</option>
                        <option value="izin-az">İzin Hakkı (Az → Çok)</option>
                        <option value="izin-cok">İzin Hakkı (Çok → Az)</option>
                    </select>
                    <span class="count-pill" id="count">—</span>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>TC Kimlik No</th>
                        <th>Ad Soyad</th>
                        <th>Doğum Tarihi</th>
                        <th>İzin Hakkı</th>
                        <th>Oda</th>
                        <th>Durum</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="tablo"></tbody>
            </table>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="students.js"></script>
</body>

</html>
